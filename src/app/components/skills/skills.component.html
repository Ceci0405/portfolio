<section id="skills" class="section skills-section">
  <div class="container">
    <div class="section-label">Habilidades</div>
    <h2 class="section-title reveal">Lo que sé hacer</h2>
    <div class="divider"></div>

    <div class="skills-grid">
      <div class="skill-group reveal" *ngFor="let cat of categories">
        <h3 class="cat-title">{{cat}}</h3>
        <div class="skill-bars">
          <div class="skill-item" *ngFor="let skill of getByCategory(cat)">
            <div class="skill-header">
              <span class="skill-name">{{skill.name}}</span>
              <span class="skill-pct">{{skill.level}}%</span>
            </div>
            <div class="bar-bg">
              <div class="bar-fill" [style.width.%]="skill.level"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
